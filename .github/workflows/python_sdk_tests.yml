name: Test Python SDK

on:
  workflow_call:
    inputs:
      E2B_DOMAIN:
        required: false
        type: string
        default: ''
      run:
        description: 'Whether to actually run the build and tests. When false the matrix jobs are skipped (reported as success to required checks).'
        required: false
        type: boolean
        default: true
    secrets:
      E2B_API_KEY:
        required: true

permissions:
  contents: read

jobs:
  test:
    # Gate each step (not the job) on `inputs.run` so the matrix always expands
    # and the per-OS required checks are created even when skipped.
    defaults:
      run:
        working-directory: ./packages/python-sdk
        shell: bash
    name: Python SDK - Build and test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        if: ${{ inputs.run }}
        uses: actions/checkout@v4

      - name: Parse .tool-versions
        if: ${{ inputs.run }}
        uses: wistia/parse-tool-versions@v2.1.1
        with:
          filename: '.tool-versions'
          uppercase: 'true'
          prefix: 'tool_version_'

      - name: Set up Python
        if: ${{ inputs.run }}
        uses: actions/setup-python@v4
        with:
          python-version: '${{ env.TOOL_VERSION_PYTHON }}'

      - name: Install and configure Poetry
        if: ${{ inputs.run }}
        uses: snok/install-poetry@v1
        with:
          version: '${{ env.TOOL_VERSION_POETRY }}'
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install dependencies
        if: ${{ inputs.run }}
        run: poetry install

      - name: Test build
        if: ${{ inputs.run }}
        run: poetry build

      - name: Run tests
        if: ${{ inputs.run }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            poetry run pytest --verbose
          else
            poetry run pytest --verbose --numprocesses=4
          fi
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          E2B_DOMAIN: ${{ inputs.E2B_DOMAIN }}
